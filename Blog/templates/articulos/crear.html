
{% extends 'base.html' %}

{% block contenido_cuerpo %}

<div class="crear-articulo-container">
    <h2>Crear Artículo</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="formulario-articulo">
            {{ form.as_p }}
        </div>

        <div class="botones">
            <button type="submit" class="btn btn-primary">Crear</button>
            <a href="{% url 'articulos:path_listar_articulos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock contenido_cuerpo %}
